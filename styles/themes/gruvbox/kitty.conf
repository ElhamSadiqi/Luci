# ==========================================
# GRUVBOX (KITTY)
# ==========================================

font_family          JetBrainsMono Nerd Font
font_size            12.0
window_padding_width 27

background_opacity          0.8
dynamic_background_opacity  yes

background            #282828
foreground            #d5c4a1
selection_background  #ebdbb2
selection_foreground  #282828

cursor                #83a598
cursor_text_color     #282828
cursor_shape          beam
cursor_beam_thickness 5.0
cursor_blink_interval 0.5

cursor_trail 3
cursor_trail_decay 0.1 0.4

active_tab_background   #83a598
active_tab_foreground   #282828
inactive_tab_background #282828
inactive_tab_foreground #d5c4a1

color0  #282828
color8  #484442

color1  #fb4934
color9  #fe8019

color2  #b8bb26
color10 #8ec07c

color3  #fabd2f
color11 #d65d0e

color4  #83a598
color12 #83a598

color5  #d3869b
color13 #d3869b

color6  #8ec07c
color14 #8ec07c

color7  #d5c4a1
color15 #fbf1c7

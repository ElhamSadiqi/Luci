# ==========================================
# NORD (KITTY)
# ==========================================

font_family          JetBrainsMono Nerd Font
font_size            12.0
window_padding_width 27

background_opacity          0.5
dynamic_background_opacity  yes

background            #2E3440
foreground            #E5E9F0
selection_background  #ECEFF4
selection_foreground  #2E3440

cursor                #88C0D0
cursor_text_color     #2E3440
cursor_shape          beam
cursor_beam_thickness 5.0
cursor_blink_interval 0.5

cursor_trail 3
cursor_trail_decay 0.1 0.4

active_tab_background   #88C0D0
active_tab_foreground   #2E3440
inactive_tab_background #2E3440
inactive_tab_foreground #E5E9F0

color0  #2E3440
color8  #4C566A

color1  #88C0D0
color9  #81A1C1

color2  #A3BE8C
color10 #A3BE8C

color3  #88C0D0
color11 #81A1C1

color4  #81A1C1
color12 #81A1C1

color5  #B48EAD
color13 #B48EAD

color6  #8FBCBB
color14 #88C0D0

color7  #E5E9F0
